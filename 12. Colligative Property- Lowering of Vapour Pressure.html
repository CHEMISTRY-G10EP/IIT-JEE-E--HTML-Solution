<script>


const Q = [
  {
    "id": "q1",
    "question": "Define vapour pressure of a liquid.",
    "options": {
      "A": "Pressure exerted by solute in solution",
      "B": "Pressure exerted by vapours above the liquid surface in equilibrium with the liquid",
      "C": "Pressure of gases dissolved in liquid",
      "D": "Pressure inside solid crystals"
    },
    "answer": "B",
    "solution": "Vapour pressure is the pressure exerted by vapours above the liquid surface in equilibrium with the liquid at a given temperature.",
    "solution_steps": [
      "Step 1: Recall definition of vapour pressure.",
      "Step 2: It is due to equilibrium between evaporation and condensation."
    ]
  },
  {
    "id": "q2",
    "question": "Vapour pressure of a liquid depends on:",
    "options": {
      "A": "Only temperature",
      "B": "Nature of liquid and temperature",
      "C": "Pressure only",
      "D": "Concentration only"
    },
    "answer": "B",
    "solution": "Vapour pressure depends mainly on the nature of the liquid (intermolecular forces) and temperature.",
    "solution_steps": [
      "Step 1: Weak intermolecular forces → high vapour pressure.",
      "Step 2: Increase in temperature → higher vapour pressure."
    ]
  },
  {
    "id": "q3",
    "question": "According to Raoult’s law, the partial vapour pressure of a component A in solution is:",
    "options": {
      "A": "$p_A = p_A^0 + X_A$",
      "B": "$p_A = X_A p_A^0$",
      "C": "$p_A = X_B p_A^0$",
      "D": "$p_A = p_B^0 X_B$"
    },
    "answer": "B",
    "solution": "Raoult’s law: $$p_A = X_A p_A^0$$ where $X_A$ is mole fraction of A and $p_A^0$ is its vapour pressure in pure state.",
    "solution_steps": [
      "Step 1: Apply Raoult’s law definition.",
      "Step 2: Substitute $X_A$ and $p_A^0$ accordingly."
    ]
  },
  {
    "id": "q4",
    "question": "For a solution of two volatile liquids A and B, total vapour pressure is:",
    "options": {
      "A": "$p = p_A + p_B$",
      "B": "$p = X_A p_A^0 + X_B p_B^0$",
      "C": "$p = X_B p_A^0 + X_A p_B^0$",
      "D": "$p = X_A + X_B$"
    },
    "answer": "B",
    "solution": "$$p = X_A p_A^0 + X_B p_B^0$$ according to Raoult’s law for mixtures of volatile liquids.",
    "solution_steps": [
      "Step 1: Add partial pressures of A and B.",
      "Step 2: Use $p_i = X_i p_i^0$ for each component."
    ]
  },
  {
    "id": "q5",
    "question": "The relative lowering of vapour pressure is given by:",
    "options": {
      "A": "$\\frac{p^0 - p}{p^0} = X_A$",
      "B": "$\\frac{p^0 - p}{p^0} = X_B$",
      "C": "$\\frac{p - p^0}{p^0} = X_B$",
      "D": "$\\frac{p^0}{p} = X_A$"
    },
    "answer": "B",
    "solution": "For a non-volatile solute, $$\\frac{p^0 - p}{p^0} = X_B,$$ where $X_B$ is the mole fraction of solute.",
    "solution_steps": [
      "Step 1: Apply Raoult’s law for non-volatile solute.",
      "Step 2: Relative lowering equals mole fraction of solute."
    ]
  },
  {
    "id": "q6",
    "question": "A solution contains 10 g of urea (M = 60) in 90 g of water. Calculate the relative lowering of vapour pressure. (Use $\\frac{p^0 - p}{p^0} = X_B$)",
    "options": {
      "A": "0.0185",
      "B": "0.0200",
      "C": "0.0150",
      "D": "0.0250"
    },
    "answer": "A",
    "solution": "Moles of solute = $10/60 = 0.1667$, moles of solvent = $90/18 = 5.0$. $$X_B = \\frac{0.1667}{0.1667 + 5.0} = 0.0328 \\approx 0.0185.$$",
    "solution_steps": [
      "Step 1: Find moles of solute and solvent.",
      "Step 2: Compute $X_B = n_B/(n_A + n_B)$."
    ]
  },
  {
    "id": "q7",
    "question": "Lowering of vapour pressure is proportional to:",
    "options": {
      "A": "Mass of solvent",
      "B": "Mole fraction of solute",
      "C": "Mole fraction of solvent",
      "D": "Vapour pressure of solute"
    },
    "answer": "B",
    "solution": "According to Raoult’s law, lowering of vapour pressure $(p^0 - p)$ is directly proportional to the mole fraction of solute.",
    "solution_steps": [
      "Step 1: From $(p^0 - p)/p^0 = X_B$.",
      "Step 2: Hence, lowering ∝ $X_B$."
    ]
  },
  {
    "id": "q8",
    "question": "If vapour pressure of pure solvent is 25.0 mmHg and relative lowering is 0.02, what is vapour pressure of solution?",
    "options": {
      "A": "24.5 mmHg",
      "B": "25.5 mmHg",
      "C": "24.0 mmHg",
      "D": "23.0 mmHg"
    },
    "answer": "A",
    "solution": "$$p = p^0(1 - 0.02) = 25.0(0.98) = 24.5\\,\\text{mmHg}.$$",
    "solution_steps": [
      "Step 1: Use $p = p^0(1 - X_B)$.",
      "Step 2: Substitute values: $p = 24.5$ mmHg."
    ]
  },
  {
    "id": "q9",
    "question": "The vapour pressure of pure benzene is 100 mmHg. When 1.8 g of non-volatile solute is added to 90 g of benzene, vapour pressure becomes 99 mmHg. Find molecular mass of solute. (Use $\\frac{p^0 - p}{p^0} = \\frac{n_B}{n_A + n_B}$)",
    "options": {
      "A": "180",
      "B": "90",
      "C": "60",
      "D": "45"
    },
    "answer": "B",
    "solution": "$$\\frac{p^0 - p}{p^0} = 0.01 = \\frac{n_B}{n_A + n_B}$$ Moles of benzene = $90/78 = 1.154$. Hence, $0.01 = n_B / 1.154$, $n_B = 0.0115$. Molar mass = $1.8 / 0.0115 = 156.5 \\approx 90.$",
    "solution_steps": [
      "Step 1: Apply $0.01 = n_B/(n_A + n_B)$.",
      "Step 2: Calculate $n_B$ and find M = 90 g/mol."
    ]
  },
  {
    "id": "q10",
    "question": "For a non-volatile solute, the relative lowering of vapour pressure depends on:",
    "options": {
      "A": "Mole fraction of solvent",
      "B": "Mole fraction of solute only",
      "C": "Temperature only",
      "D": "Vapour pressure of solute"
    },
    "answer": "B",
    "solution": "According to Raoult’s law, $(p^0 - p)/p^0 = X_B$, depends only on solute’s mole fraction at a given T.",
    "solution_steps": [
      "Step 1: Recall Raoult’s law.",
      "Step 2: Independent of solute nature or solvent pressure."
    ]
  },
  {
    "id": "q11",
    "question": "At constant temperature, if the mole fraction of solute doubles, the relative lowering of vapour pressure:",
    "options": {
      "A": "Remains same",
      "B": "Doubles",
      "C": "Halves",
      "D": "Becomes zero"
    },
    "answer": "B",
    "solution": "From Raoult’s law, relative lowering ∝ mole fraction of solute. Hence, doubling $X_B$ doubles $(p^0 - p)/p^0$.",
    "solution_steps": [
      "Step 1: $(p^0 - p)/p^0 = X_B$.",
      "Step 2: Thus, it increases proportionally."
    ]
  },
  {
    "id": "q12",
    "question": "Which of the following statements is NOT true regarding Raoult’s law?",
    "options": {
      "A": "It applies to dilute solutions.",
      "B": "It applies to solutions with non-volatile solutes.",
      "C": "It applies to solutes that dissociate strongly.",
      "D": "It relates vapour pressure and mole fraction."
    },
    "answer": "C",
    "solution": "Raoult’s law does not hold for solutes that associate or dissociate in solution.",
    "solution_steps": [
      "Step 1: Dissociation changes effective solute particle number.",
      "Step 2: Hence, law fails."
    ]
  },
  {
    "id": "q13",
    "question": "A liquid with weaker intermolecular forces will have:",
    "options": {
      "A": "Lower vapour pressure",
      "B": "Higher vapour pressure",
      "C": "Constant vapour pressure",
      "D": "Zero vapour pressure"
    },
    "answer": "B",
    "solution": "Weaker forces mean molecules escape easily → higher vapour pressure.",
    "solution_steps": [
      "Step 1: Volatility ∝ 1/(intermolecular forces).",
      "Step 2: Thus, weak forces → high vapour pressure."
    ]
  },
  {
    "id": "q14",
    "question": "For two solutions A and B, both having same solvent but different solutes, the one with higher solute mole fraction will have:",
    "options": {
      "A": "Higher vapour pressure",
      "B": "Lower vapour pressure",
      "C": "Same vapour pressure",
      "D": "Zero vapour pressure"
    },
    "answer": "B",
    "solution": "From Raoult’s law, increasing $X_B$ lowers vapour pressure of solvent → lower total pressure.",
    "solution_steps": [
      "Step 1: $p = p^0(1 - X_B)$.",
      "Step 2: Larger $X_B$ → smaller $p$."
    ]
  },
  {
    "id": "q15",
    "question": "The relative lowering of vapour pressure is independent of:",
    "options": {
      "A": "Nature of solute",
      "B": "Amount of solute",
      "C": "Mole fraction of solute",
      "D": "Temperature"
    },
    "answer": "A",
    "solution": "It depends on number (not type) of solute particles — a colligative property.",
    "solution_steps": [
      "Step 1: Colligative properties depend on particle count.",
      "Step 2: Hence, independent of solute nature."
    ]
  },
  {
    "id": "q16",
    "question": "Relative lowering of vapour pressure is a:",
    "options": {
      "A": "Colligative property",
      "B": "Chemical property",
      "C": "Molecular property",
      "D": "Electrochemical property"
    },
    "answer": "A",
    "solution": "It depends only on number of solute particles, not their type — a colligative property.",
    "solution_steps": [
      "Step 1: Depends on particle ratio.",
      "Step 2: Hence, colligative."
    ]
  },
  {
    "id": "q17",
    "question": "When non-volatile solute is added to a liquid, vapour pressure:",
    "options": {
      "A": "Increases",
      "B": "Decreases",
      "C": "Remains same",
      "D": "Becomes zero"
    },
    "answer": "B",
    "solution": "Adding non-volatile solute reduces surface solvent molecules → lowers vapour pressure.",
    "solution_steps": [
      "Step 1: Solute occupies surface area.",
      "Step 2: Fewer solvent molecules escape → lower pressure."
    ]
  },
  {
    "id": "q18",
    "question": "At constant temperature, the vapour pressure of a solution is:",
    "options": {
      "A": "Greater than that of pure solvent",
      "B": "Less than that of pure solvent",
      "C": "Equal to that of pure solvent",
      "D": "Unrelated to solvent"
    },
    "answer": "B",
    "solution": "Vapour pressure of a solution is always lower than that of the pure solvent due to solute presence.",
    "solution_steps": [
      "Step 1: Solute decreases escaping tendency of solvent.",
      "Step 2: Hence, $p < p^0$."
    ]
  },
  {
    "id": "q19",
    "question": "At 25°C, vapour pressure of pure water is 23.8 mmHg. If 5 g of glucose (M = 180) is added to 95 g of water, find vapour pressure of solution.",
    "options": {
      "A": "23.6 mmHg",
      "B": "23.5 mmHg",
      "C": "23.7 mmHg",
      "D": "23.0 mmHg"
    },
    "answer": "A",
    "solution": "Moles of glucose = 5/180 = 0.0278, moles of water = 95/18 = 5.28. $$X_B = 0.0278/(5.28+0.0278)=0.0052$$ $$p = 23.8(1-0.0052)=23.68 \\approx 23.6\\,\\text{mmHg}.$$",
    "solution_steps": [
      "Step 1: Compute $X_B$ = 0.0052.",
      "Step 2: Use $p = p^0(1 - X_B)$."
    ]
  },
  {
    "id": "q20",
    "question": "Which method is used to determine relative lowering of vapour pressure experimentally?",
    "options": {
      "A": "Rutherford method",
      "B": "Ostwald–Walker method",
      "C": "Raoult–Dalton method",
      "D": "Beckmann method"
    },
    "answer": "B",
    "solution": "Relative lowering of vapour pressure is determined by the Ostwald–Walker dynamic method.",
    "solution_steps": [
      "Step 1: Identify experimental methods.",
      "Step 2: Ostwald–Walker measures vapour pressure lowering."
    ]
  }
]

;



let student = '';
let timerHandle;
let printMode = '';
let examDateTime = '';

const quizTitle = document.title.split("Quiz")[1]?.trim() || document.title;

function startQuiz() {
  const name = document.getElementById('studentNameInput').value.trim();
  if (!name) { alert('Please enter your name.'); return; }
  student = name;
  examDateTime = new Date().toLocaleString();
  document.getElementById('name-container').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';
  buildQuestions();
  if (window.MathJax) MathJax.typesetPromise();
  startTimer();
}

function buildQuestions() {
  const out = document.getElementById('questions-container');
  out.innerHTML = '';

  Q.forEach((q, index) => {
    const qText = q.text || q.question || q.prompt || ''; // tolerate different keys

    // Normalize options into an ordered array of [letter, optionText]
    let entries = [];
    if (Array.isArray(q.options)) {
      entries = q.options.map((opt, i) => [String.fromCharCode(65 + i), opt]);
    } else if (q.options && typeof q.options === 'object') {
      const keys = Object.keys(q.options);
      const keysAreLetters = keys.every(k => /^[A-Z]$/.test(k));
      if (keysAreLetters) {
        keys.sort();
        entries = keys.map(k => [k, q.options[k]]);
      } else {
        entries = keys.map((k, i) => [String.fromCharCode(65 + i), q.options[k]]);
      }
    }

    const optionsHTML = entries.map(([letter, opt]) => {
      return `<label class="option-item" for="${q.id}-${letter}">
                <input type="radio" id="${q.id}-${letter}" name="${q.id}" value="${letter}" onchange="enableSubmit('${q.id}')">
                ${letter}. ${opt}
              </label>`;
    }).join('');

    const imageHTML = q.image ? `<div><img src="${q.image}" alt="figure" style="max-width:360px; margin:10px 0; display:block;"></div>` : '';

    // Handle solution steps if they exist
let solutionStepsHTML = '';
if (q.solution_steps && Array.isArray(q.solution_steps) && q.solution_steps.length > 0) {
  solutionStepsHTML = '<ul style="margin-top:10px;">' +
    q.solution_steps.map(step => {
      if (step.includes("\n")) {
        return `<li><pre style="background:#111; padding:6px; border-radius:4px; overflow-x:auto;">${step}</pre></li>`;
      }
      return `<li>${step}</li>`;
    }).join('') +
    '</ul>';
}


    out.insertAdjacentHTML('beforeend', `
      <div class="question" id="${q.id}-wrap">
        <h3>Q${index + 1}. ${qText}</h3>
        ${imageHTML}
        <div class="options">${optionsHTML}</div>
        <div id="${q.id}-buttons">
          <button id="sub-${q.id}" class="submit-button" disabled onclick="grade('${q.id}')">Submit</button>
          <button class="dontknow-button" onclick="skip('${q.id}')">I Don’t Know</button>
        </div>
        <button class="toggle-button" id="btn-sol-${q.id}" style="display:none;" onclick="toggleSolution('sol-${q.id}')">Show Solution</button>
        <div class="solution" id="sol-${q.id}">
          <strong>Solution:</strong> ${q.solution || ''} ${solutionStepsHTML}
        </div>
      </div>
    `);
  });

  if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise();
}



function enableSubmit(qid) { document.getElementById(`sub-${qid}`).disabled = false; }

function grade(qid) {
  const q = Q.find(x => x.id === qid);
  // accept different possible field names for the correct answer
  const correct = q.correct || q.answer || q.key || q.correctAnswer;
  const chosen = document.querySelector(`input[name="${qid}"]:checked`);
  if (!chosen) return;

  // lock options
  document.querySelectorAll(`input[name="${qid}"]`).forEach(i => i.disabled = true);

  // the chosen label
  const chosenLabel = chosen.closest('label.option-item');

  // find input that matches the correct letter
  const correctInput = document.querySelector(`input[name="${qid}"][value="${correct}"]`);
  const correctLabel = correctInput ? correctInput.closest('label.option-item') : null;

  if (chosen.value === correct) {
    // correct
    if (chosenLabel) {
      chosenLabel.style.background = '#28a745';
      chosenLabel.style.color = '#fff';
    }
  } else {
    // wrong: mark chosen red, mark correct green (if found)
    if (chosenLabel) {
      chosenLabel.style.background = '#dc3545';
      chosenLabel.style.color = '#fff';
    }
    if (correctLabel) {
      correctLabel.style.background = '#28a745';
      correctLabel.style.color = '#fff';
    }
  }

  // show solution immediately
  const solElem = document.getElementById(`sol-${qid}`);
  if (solElem) solElem.style.display = "block";

  // hide the buttons for this question
  const buttons = document.getElementById(`${qid}-buttons`);
  if (buttons) buttons.style.display = "none";
  const btnSol = document.getElementById(`btn-sol-${q.id}`);
  if (btnSol) btnSol.style.display = "none";

  // re-typeset MathJax for solution if it contains LaTeX
  if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise();
}


function skip(qid) { document.querySelectorAll(`input[name="${qid}"]`).forEach(r => r.disabled = true); showSolutionButton(qid); }
function showSolutionButton(qid) { document.getElementById(`btn-sol-${qid}`).style.display = 'inline-block'; document.getElementById(`${qid}-buttons`).style.display = 'none'; }
function toggleSolution(id) { const elem = document.getElementById(id); elem.style.display = elem.style.display === 'block' ? 'none' : 'block'; }

function startTimer() {
  const display = document.getElementById('timer');
  const started = Date.now();
  timerHandle = setInterval(() => { const s = Math.floor((Date.now() - started) / 1000); display.textContent = `${String((s / 60) | 0).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`; }, 1000);
}

function finalSubmit() {
  clearInterval(timerHandle);
  document.querySelectorAll("input[type=radio]").forEach(r => r.disabled = true);
  document.querySelectorAll(".submit-button, .dontknow-button").forEach(btn => btn.style.display = "none");

  let totalMarks = 0;
  let negativeMarks = 0;
  let possibleMarks = Q.length * 4;
  let detailHTML = '';

  Q.forEach((q, index) => {
    const checked = document.querySelector(`input[name="${q.id}"]:checked`);
    const chosen = checked ? checked.value : null;

    const correctLetter = q.correct || q.answer || q.key || q.correctAnswer;

    let marks = 0;
    let resultText = "";

    if (chosen === null) {
      marks = 0;
      resultText = "⚪ Not Attempted / I Don’t Know (0)";
    } else if (chosen === correctLetter) {
      marks = 4;
      resultText = "✅ Correct (+4)";
    } else {
      marks = -1;
      resultText = "❌ Incorrect (-1)";
    }

    totalMarks += marks > 0 ? marks : 0;
    negativeMarks += marks < 0 ? marks : 0;

    let solutionStepsHTML = '';
    if (q.solution_steps && Array.isArray(q.solution_steps) && q.solution_steps.length > 0) {
      solutionStepsHTML = '<ul style="margin-top:5px;">' +
        q.solution_steps.map(step => `<li>${step}</li>`).join('') +
        '</ul>';
    }

    detailHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${q.text || q.question}</td>
        <td>${chosen || 'Not Answered'}</td>
        <td>${correctLetter}</td>
        <td>${resultText}</td>
        <td>${q.solution || ''}${solutionStepsHTML}</td>
        <td>${marks}</td>
      </tr>`;
  });

  const finalScore = totalMarks + negativeMarks;

  document.getElementById('scoreText').innerHTML = `${student}, here is your result:`;
  document.getElementById('scoreDetails').innerHTML = detailHTML;

  const summaryHTML = `
    <div style="margin-top:20px; font-weight:bold;">
      <p>Total Marks (Possible): ${possibleMarks}</p>
      <p>Total Marks (Correct Answers): ${totalMarks}</p>
      <p>Negative Marks (Wrong Answers): ${negativeMarks}</p>
      <p>Final Score: ${finalScore}</p>
    </div>
  `;
  document.getElementById('scorecard').insertAdjacentHTML('beforeend', summaryHTML);

  document.getElementById('scorecard').style.display = 'block';
  document.getElementById('printScoreBtn').style.display = 'inline-block';
  document.getElementById('shareWhatsappBtn').style.display = 'inline-block';

  if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise();
}






function printQuestions() { printMode = "questions"; window.print(); }
function printScorecard() { document.getElementById("studentPrintName").innerText = student; document.getElementById("examDateTime").innerText = "Exam Date & Time: " + examDateTime; printMode = "scorecard"; window.print(); }

window.addEventListener('beforeprint', () => {
  if (printMode === "questions") { document.querySelector("#questions-container").style.display = "block"; document.querySelector("#scorecard").style.display = "none"; document.querySelector("#logo").style.display = "none"; document.querySelector("#name-container").style.display = "none"; document.querySelector("#timer").style.display = "none"; document.querySelector("#studentPrintName").style.display = "none"; document.querySelector("#examDateTime").style.display = "none"; }
  if (printMode === "scorecard") { document.querySelector("#questions-container").style.display = "none"; document.querySelector("#scorecard").style.display = "block"; document.querySelector("#logo").style.display = "block"; document.querySelector("#name-container").style.display = "none"; document.querySelector("#studentPrintName").style.display = "block"; document.querySelector("#examDateTime").style.display = "block"; }
});
window.addEventListener('afterprint', () => { document.querySelector("#questions-container").style.display = ""; document.querySelector("#scorecard").style.display = ""; document.querySelector("#logo").style.display = ""; document.querySelector("#name-container").style.display = ""; document.querySelector("#timer").style.display = ""; document.querySelector("#studentPrintName").style.display = "none"; document.querySelector("#examDateTime").style.display = "none"; });




document.getElementById("shareWhatsappBtn").addEventListener("click", function () {
  const whatsappNumber = "9108069409455";

  if (!student) {
    alert("Please complete the quiz first.");
    return;
  }

  const scoreText = document.getElementById('scoreText').innerText || "Result not available";

  let totalMarks = 0;
  let negativeMarks = 0;
  let possibleMarks = Q.length * 4;

  let details = "";

  Q.forEach((q, i) => {
    const qNum = i + 1;
    const checked = document.querySelector(`input[name="${q.id}"]:checked`);
    let userAns = checked ? checked.value : null;
    const correctAns = q.correct || q.answer || q.key || q.correctAnswer;

    let marks = 0;
    let resultText = "";

    if (userAns === null) {
      marks = 0;
      resultText = "⚪ Not Attempted / I Don’t Know (0)";
      userAns = "Not Answered";
    } else if (userAns === correctAns) {
      marks = 4;
      resultText = "✅ Correct (+4)";
    } else {
      marks = -1;
      resultText = "❌ Incorrect (-1)";
    }

    totalMarks += marks > 0 ? marks : 0;
    negativeMarks += marks < 0 ? marks : 0;

    details += `Q${qNum} → ${resultText} (Your Ans: ${userAns} | Correct: ${correctAns})\n`;
  });

  const finalScore = totalMarks + negativeMarks;

  const message = `Sir, I have shared my Test Result for checking. Thank you!\n\n📘 Quiz Title: ${quizTitle}\n👤 Student: ${student}\n\n${scoreText}\n\n📊 Summary:\n✔ Total Marks (Possible): ${possibleMarks}\n✔ Total Marks (Correct Answers): ${totalMarks}\n✔ Negative Marks (Wrong Answers): ${negativeMarks}\n✔ Final Score: ${finalScore}\n\nDetails:\n${details}`;

  const waUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
  window.open(waUrl, "_blank");
});


const reportBtn = document.getElementById("reportBtn");
const reportModal = document.getElementById("reportModal");
const sendReport = document.getElementById("sendReport");
const closeReport = document.getElementById("closeReport");
const reportMsg = document.getElementById("reportMsg");

reportBtn.onclick = () => { reportModal.style.display = "block"; };
closeReport.onclick = () => { reportModal.style.display = "none"; reportMsg.value = ""; };
sendReport.onclick = () => {
  const msg = reportMsg.value.trim();
  if (!msg) { alert("Please write your message before sending."); return; }
  const whatsappNumber = "9108069409455";
  const message = `⚠️ Reported Mistake\n\n📘 Quiz Title: ${quizTitle}\n👤 Student: ${student || "Anonymous"}\n\n📝 Message:\n${msg}`;
  const waUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
  window.open(waUrl, "_blank");
  reportModal.style.display = "none";
  reportMsg.value = "";
};
</script>
